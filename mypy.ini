[mypy]
python_version = 3.12
ignore_missing_imports = True
warn_unused_ignores = False
exclude = (?x)(
    ^alembic/
    | ^tests/
  )

# The project uses SQLAlchemy's legacy `Column(...)` declarative style (not
# `Mapped[...]`) and aiogram's `CallbackQuery.message` is typed as
# `Message | InaccessibleMessage | None`. Both are accurate-but-noisy for a
# codebase that doesn't fully annotate around them; disabling these classes
# keeps mypy useful for catching real logic errors (undefined names, wrong
# call signatures) without hundreds of framework-typing false positives.
disable_error_code = union-attr, arg-type, no-redef, override, assignment, misc, index, attr-defined, return-value, call-overload
